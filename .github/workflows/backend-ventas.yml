name: Backend Ventas CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - 'back-Ventas_SpringBoot/**'
  pull_request:
    branches: [main]
    paths:
      - 'back-Ventas_SpringBoot/**'

env:
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: chmod +x mvnw && ./mvnw clean package -DskipTests
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST

  build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/backend-ventas:latest
            ${{ steps.ecr-login.outputs.registry }}/backend-ventas:${{ github.sha }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          ECR_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          REGION: ${{ secrets.AWS_REGION }}
          INSTANCE_ID: ${{ secrets.EC2_VENTAS_INSTANCE_ID }}
        run: |
          SCRIPT="#!/bin/bash"
          SCRIPT="$SCRIPT
          aws ecr get-login-password --region $REGION | sudo docker login --username AWS --password-stdin $ECR_URI"
          SCRIPT="$SCRIPT
          sudo docker stop ventas 2>/dev/null || true"
          SCRIPT="$SCRIPT
          sudo docker rm ventas 2>/dev/null || true"
          SCRIPT="$SCRIPT
          sudo docker pull $ECR_URI/backend-ventas:latest"
          SCRIPT="$SCRIPT
          sudo docker run -d --name ventas --restart unless-stopped -p 8080:8080 $ECR_URI/backend-ventas:latest"

          SCRIPT_JSON=$(echo "$SCRIPT" | python3 -c 'import json,sys; print(json.dumps([sys.stdin.read()]))')

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=$SCRIPT_JSON" \
            --region "$REGION"
