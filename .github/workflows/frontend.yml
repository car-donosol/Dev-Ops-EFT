name: Frontend CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - 'front_despacho/**'
  pull_request:
    branches: [main]
    paths:
      - 'front_despacho/**'

env:
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: front_despacho/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: front_despacho

      - name: Build
        run: npm run build
        working-directory: front_despacho

  build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/frontend:latest
            ${{ steps.ecr-login.outputs.registry }}/frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          ECR_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          REGION: ${{ secrets.AWS_REGION }}
          INSTANCE_ID: ${{ secrets.EC2_FRONTEND_INSTANCE_ID }}
          VENTAS_IP: ${{ secrets.BACKEND_VENTAS_PRIVATE_IP }}
          DESPACHOS_IP: ${{ secrets.BACKEND_DESPACHOS_PRIVATE_IP }}
        run: |
          SCRIPT="#!/bin/bash"
          SCRIPT="$SCRIPT
          aws ecr get-login-password --region $REGION | sudo docker login --username AWS --password-stdin $ECR_URI"
          SCRIPT="$SCRIPT
          sudo docker stop frontend 2>/dev/null || true"
          SCRIPT="$SCRIPT
          sudo docker rm frontend 2>/dev/null || true"
          SCRIPT="$SCRIPT
          sudo docker pull $ECR_URI/frontend:latest"
          SCRIPT="$SCRIPT
          sudo docker run -d --name frontend --restart unless-stopped -p 80:80 -e BACKEND_VENTAS_URL=http://$VENTAS_IP:8080 -e BACKEND_DESPACHOS_URL=http://$DESPACHOS_IP:8081 $ECR_URI/frontend:latest"

          SCRIPT_JSON=$(echo "$SCRIPT" | python3 -c 'import json,sys; print(json.dumps([sys.stdin.read()]))')

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=$SCRIPT_JSON" \
            --region "$REGION"
