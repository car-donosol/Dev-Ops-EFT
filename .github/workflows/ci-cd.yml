name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build back-Despachos
        run: chmod +x mvnw && ./mvnw clean package -DskipTests
        working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Build back-Ventas
        run: chmod +x mvnw && ./mvnw clean package -DskipTests
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: front_despacho/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: front_despacho

      - name: Build frontend
        run: npm run build
        working-directory: front_despacho

  build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
            image: backend-despachos
          - context: ./back-Ventas_SpringBoot/Springboot-API-REST
            image: backend-ventas
          - context: ./front_despacho
            image: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ matrix.image }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ matrix.image }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - image: frontend
            port: 80
            name: frontend
          - image: backend-despachos
            port: 8081
            name: despachos
          - image: backend-ventas
            port: 8080
            name: ventas
    steps:
      - name: Resolve instance ID
        id: resolve
        run: |
          case "${{ matrix.name }}" in
            frontend)
              echo "instance_id=${{ secrets.EC2_FRONTEND_INSTANCE_ID }}" >> $GITHUB_OUTPUT
              ;;
            despachos)
              echo "instance_id=${{ secrets.EC2_DESPACHOS_INSTANCE_ID }}" >> $GITHUB_OUTPUT
              ;;
            ventas)
              echo "instance_id=${{ secrets.EC2_VENTAS_INSTANCE_ID }}" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          ECR_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          REGION: ${{ secrets.AWS_REGION }}
          IMAGE: ${{ matrix.image }}
          NAME: ${{ matrix.name }}
          PORT: ${{ matrix.port }}
          VENTAS_IP: ${{ secrets.BACKEND_VENTAS_PRIVATE_IP }}
          DESPACHOS_IP: ${{ secrets.BACKEND_DESPACHOS_PRIVATE_IP }}
          INSTANCE_ID: ${{ steps.resolve.outputs.instance_id }}
        run: |
          SCRIPT="#!/bin/bash"
          SCRIPT="$SCRIPT
          aws ecr get-login-password --region $REGION | sudo docker login --username AWS --password-stdin $ECR_URI"
          SCRIPT="$SCRIPT
          sudo docker stop $NAME 2>/dev/null || true"
          SCRIPT="$SCRIPT
          sudo docker rm $NAME 2>/dev/null || true"
          SCRIPT="$SCRIPT
          sudo docker pull $ECR_URI/$IMAGE:latest"

          if [ "$NAME" = "frontend" ]; then
            SCRIPT="$SCRIPT
          sudo docker run -d --name $NAME --restart unless-stopped -p $PORT:$PORT -e BACKEND_VENTAS_URL=http://$VENTAS_IP:8080 -e BACKEND_DESPACHOS_URL=http://$DESPACHOS_IP:8081 $ECR_URI/$IMAGE:latest"
          else
            SCRIPT="$SCRIPT
          sudo docker run -d --name $NAME --restart unless-stopped -p $PORT:$PORT $ECR_URI/$IMAGE:latest"
          fi

          SCRIPT_JSON=$(echo "$SCRIPT" | python3 -c 'import json,sys; print(json.dumps([sys.stdin.read()]))')

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=$SCRIPT_JSON" \
            --region "$REGION"
