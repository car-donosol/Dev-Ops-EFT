name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test back-Despachos
        run: |
          chmod +x back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/mvnw
          ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/mvnw clean package
        working-directory: .

      - name: Build and test back-Ventas
        run: |
          chmod +x back-Ventas_SpringBoot/Springboot-API-REST/mvnw
          ./back-Ventas_SpringBoot/Springboot-API-REST/mvnw clean package
        working-directory: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: front_despacho/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: front_despacho

      - name: Build frontend
        run: npm run build
        working-directory: front_despacho

  build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
            image: backend-despachos
          - context: ./back-Ventas_SpringBoot/Springboot-API-REST
            image: backend-ventas
          - context: ./front_despacho
            image: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ matrix.image }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ matrix.image }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - instance-id: ${{ secrets.EC2_FRONTEND_INSTANCE_ID }}
            image: frontend
            port: 80
            name: frontend
            env-flags: >-
              -e BACKEND_VENTAS_URL=http://${{ secrets.BACKEND_VENTAS_PRIVATE_IP }}:8080
              -e BACKEND_DESPACHOS_URL=http://${{ secrets.BACKEND_DESPACHOS_PRIVATE_IP }}:8081
          - instance-id: ${{ secrets.EC2_DESPACHOS_INSTANCE_ID }}
            image: backend-despachos
            port: 8081
            name: despachos
            env-flags: >-
              -e DB_ENDPOINT=${{ secrets.DB_ENDPOINT }}
              -e DB_PORT=3306
              -e DB_NAME=despachos_db
              -e DB_USERNAME=${{ secrets.DB_USERNAME }}
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          - instance-id: ${{ secrets.EC2_VENTAS_INSTANCE_ID }}
            image: backend-ventas
            port: 8080
            name: ventas
            env-flags: >-
              -e DB_ENDPOINT=${{ secrets.DB_ENDPOINT }}
              -e DB_PORT=3306
              -e DB_NAME=ventas_db
              -e DB_USERNAME=${{ secrets.DB_USERNAME }}
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        uses: appleboy/ssm-action@v1
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ secrets.AWS_REGION }}
          instance_id: ${{ matrix.instance-id }}
          script: |
            ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            # Login to ECR (with credentials for LabInstance compatibility)
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              --access-key-id ${{ secrets.AWS_ACCESS_KEY_ID }} \
              --secret-access-key ${{ secrets.AWS_SECRET_ACCESS_KEY }} | \
              docker login --username AWS --password-stdin $ECR_URI

            # Stop and remove old container
            docker stop ${{ matrix.name }} 2>/dev/null || true
            docker rm ${{ matrix.name }} 2>/dev/null || true

            # Pull latest image
            docker pull $ECR_URI/${{ matrix.image }}:latest

            # Run new container
            docker run -d \
              --name ${{ matrix.name }} \
              --restart unless-stopped \
              -p ${{ matrix.port }}:${{ matrix.port }} \
              ${{ matrix.env-flags }} \
              $ECR_URI/${{ matrix.image }}:latest
